name: agent · growth-strategist

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays ~8a ET
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: growth-strategist
      dry_run: ${{ inputs.dry_run || false }}
