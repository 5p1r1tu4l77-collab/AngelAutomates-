name: event · sync pipeline → notion

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "data/pipeline.csv"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install httpx
        run: pip install httpx

      - name: Sync to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: python scripts/sync_pipeline_to_notion.py
