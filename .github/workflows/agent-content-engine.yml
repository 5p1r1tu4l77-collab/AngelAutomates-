name: agent · content-engine

on:
  schedule:
    - cron: "0 11 */2 * *"   # ~7a ET, every other day
  push:
    branches: [main, "claude/**"]
    paths:
      - "data/case-studies/**"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: content-engine
      dry_run: ${{ inputs.dry_run || false }}
