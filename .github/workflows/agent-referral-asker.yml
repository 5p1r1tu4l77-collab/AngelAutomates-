name: agent · referral-asker

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
  repository_dispatch:
    types: [pilot-completed, milestone-3mo, milestone-6mo, nps-high]

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: referral-asker
      dry_run: ${{ inputs.dry_run || false }}
