name: agent · pilot-deliverer

on:
  schedule:
    - cron: "0 14 * * 1-5"   # weekdays 10a ET
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: pilot-deliverer
      dry_run: ${{ inputs.dry_run || false }}
