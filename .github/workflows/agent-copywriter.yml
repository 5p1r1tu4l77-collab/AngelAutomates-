name: agent · copywriter

on:
  schedule:
    - cron: "5,35 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: copywriter
      dry_run: ${{ inputs.dry_run || false }}
