name: agent · sales-ops

on:
  schedule:
    - cron: "*/30 13-23 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: sales-ops
      dry_run: ${{ inputs.dry_run || false }}
