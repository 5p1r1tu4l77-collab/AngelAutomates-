name: agent · compliance-monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: compliance-monitor
      dry_run: ${{ inputs.dry_run || false }}
