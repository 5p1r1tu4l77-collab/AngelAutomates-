name: agent · prospector

on:
  schedule:
    - cron: "15 * * * *"   # every hour at :15
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: prospector
      dry_run: ${{ inputs.dry_run || false }}
