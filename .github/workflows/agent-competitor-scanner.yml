name: agent · competitor-scanner

on:
  schedule:
    - cron: "0 14 * * 2"   # Tuesdays ~10a ET
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: competitor-scanner
      dry_run: ${{ inputs.dry_run || false }}
