name: agent · recruiter

on:
  schedule:
    - cron: "0 12 1,15 * *"   # 1st & 15th of each month, ~8a ET
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: recruiter
      dry_run: ${{ inputs.dry_run || false }}
