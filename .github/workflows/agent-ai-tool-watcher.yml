name: agent · ai-tool-watcher

on:
  schedule:
    - cron: "0 14 * * 5"   # Fridays ~10a ET
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: ai-tool-watcher
      dry_run: ${{ inputs.dry_run || false }}
