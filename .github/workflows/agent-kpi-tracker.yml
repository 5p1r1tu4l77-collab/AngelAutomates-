name: agent · kpi-tracker

on:
  schedule:
    - cron: "0 13 * * *"   # daily 9a ET full report
    - cron: "0 * * * *"    # hourly mini
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: kpi-tracker
      dry_run: ${{ inputs.dry_run || false }}
