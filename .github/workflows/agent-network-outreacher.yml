name: agent · network-outreacher

on:
  schedule:
    - cron: "0 13 * * 1-6"   # Mon–Sat 9a ET
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false

jobs:
  run:
    uses: ./.github/workflows/_agent-runner.yml
    secrets: inherit
    with:
      agent: network-outreacher
      dry_run: ${{ inputs.dry_run || false }}
